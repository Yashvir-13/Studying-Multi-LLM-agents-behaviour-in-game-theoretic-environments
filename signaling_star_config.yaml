# ============================================================
# PUBLISHABLE Signaling Game — Star Topology, Symmetric (Control)
# ============================================================
# 9 configs × 30 trials = 270 experiments (~4.5 hours)
# Star: all senders → one central receiver (bottleneck stress test)
# Usage: python3 main.py --mode sweep --config signaling_star_config.yaml
# ============================================================

model: "qwen3.5:9b"
temperature: 0.7
num_predict: 64
think: false

environment: "signaling_game"

# --- Sweep Grid (3 × 1 × 1 × 3 = 9 configurations) ---
num_senders: [2, 3, 5]
num_receivers: [1]
topology: ["star"]
memory_limit: [1, 3, 5]

# --- Game Parameters ---
high_probability: 0.7
receiver_action_mode: "per_sender"
reveal_sender_states: true

# SYMMETRIC payoffs (control)
sender_reward_high_invest: 3.0
sender_reward_low_invest: 3.0
sender_reward_pass: 0.0
receiver_reward_high_invest: 3.0
receiver_reward_low_invest: -1.0
receiver_reward_pass: 0.0

# --- Simulation ---
rounds: 20
trials_per_config: 30
agent_type: "llm_sender_adaptive_receiver"

base_output_dir: "logs"
