# ============================================================
# PUBLISHABLE Signaling Game — Symmetric Payoffs (Control)
# ============================================================
# 36 configs × 30 trials = 1,080 experiments (~18 hours)
# Usage: python3 main.py --mode sweep --config signaling_game_config.yaml
# ============================================================

model: "qwen3.5:9b"
temperature: 0.7
num_predict: 64
think: false

environment: "signaling_game"

# --- Sweep Grid (3 × 3 × 2 × 2 = 36 configurations) ---
num_senders: [2, 3, 5]        # Scale: small → large sender population
num_receivers: [2, 3, 5]      # Scale: small → large receiver population
topology: ["full", "ring"]    # Dense vs. sparse communication
memory_limit: [3, 5]          # Medium and long memory for adaptive receivers

# --- Game Parameters ---
high_probability: 0.7
receiver_action_mode: "per_sender"
reveal_sender_states: true

# SYMMETRIC payoffs (control baseline):
# No scam incentive — lying has no extra reward
sender_reward_high_invest: 3.0
sender_reward_low_invest: 3.0
sender_reward_pass: 0.0
receiver_reward_high_invest: 3.0
receiver_reward_low_invest: -1.0
receiver_reward_pass: 0.0

# --- Simulation ---
rounds: 20
trials_per_config: 30
agent_type: "llm_sender_adaptive_receiver"

base_output_dir: "logs"
