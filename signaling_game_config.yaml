# ============================================================
# Signaling Game Configuration
# ============================================================
# Usage: python3 main.py --mode sweep --config signaling_game_config.yaml
# ============================================================

# --- LLM Model Settings ---
model: "qwen3.5:9b"
temperature: 0.7
num_predict: 64
think: false

# --- Environment ---
environment: "signaling_game"

# --- Sweep Grid (cartesian product) ---
num_senders: [2]
num_receivers: [2]
topology: ["ring", "star"]
memory_limit: [3, 5]

# --- Game Parameters ---
high_probability: 0.7
receiver_action_mode: "per_sender"
reveal_sender_states: true

# Asymmetric sender payoffs ("Scammer Incentive"):
#   Scamming (LOW item + invest) pays 5x more than a legitimate sale
sender_reward_high_invest: 2.0
sender_reward_low_invest: 10.0
sender_reward_pass: 0.0

receiver_reward_high_invest: 3.0
receiver_reward_low_invest: -1.0
receiver_reward_pass: 0.0

# --- Simulation ---
rounds: 20
trials_per_config: 15
agent_type: "llm_sender_adaptive_receiver"

# --- Output ---
base_output_dir: "logs"
