# ============================================================
# PUBLISHABLE Signaling Game — Asymmetric Payoffs (Treatment)
# ============================================================
# 36 configs × 30 trials = 1,080 experiments (~24 hours)
# Receivers reduced to [2, 5] (symmetric data showed <2% effect of R count)
# Usage: python3 main.py --mode sweep --config signaling_asymmetric_config.yaml
# ============================================================

model: "qwen3.5:9b"
temperature: 0.7
num_predict: 64
think: false

environment: "signaling_game"

# --- Sweep Grid (3 × 2 × 2 × 3 = 36 configurations) ---
num_senders: [2, 3, 5]
num_receivers: [2, 5]          # Trimmed: R=3 dropped (symmetric showed <2% marginal effect)
topology: ["full", "ring"]
memory_limit: [1, 3, 5]

# --- Game Parameters ---
high_probability: 0.7
receiver_action_mode: "per_sender"
reveal_sender_states: true

# ASYMMETRIC payoffs ("Scammer Incentive"): scam pays 5x
sender_reward_high_invest: 2.0
sender_reward_low_invest: 10.0
sender_reward_pass: 0.0
receiver_reward_high_invest: 3.0
receiver_reward_low_invest: -1.0
receiver_reward_pass: 0.0

# --- Simulation ---
rounds: 20
trials_per_config: 30
agent_type: "llm_sender_adaptive_receiver"

base_output_dir: "logs"
